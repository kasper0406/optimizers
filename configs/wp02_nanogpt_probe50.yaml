# 50-STEP TIMING PROBE (not a reproduction). Truncated run whose only
# purpose is to convert the runtime/cost ESTIMATE in docs/nanogpt-port.md
# into a measurement before committing budget to the full repro.
# nanogpt.max_steps flips metrics.record_faithful to false by design.
experiment: nanogpt
device: auto
seed: 1700
nanogpt:
  device_count: 1
  precision_mode: fp8
  attention_impl: flex
  compile: true
  warmup_steps: 10
  num_iterations: 1750
  cooldown_frac: 0.45
  min_lr_frac: 0.05
  val_loss_every: 125
  val_tokens: 10485760
  train_seq_len: 49152
  val_seq_len: 262144
  muon_lr: 0.05
  muon_momentum: 0.95
  muon_weight_decay: 0.0
  adam_lr: 0.008
  adam_betas:
  - 0.8
  - 0.95
  adam_eps: 1.0e-10
  adam_weight_decay: 0.0
  target_val_loss: 3.28
  checkpoint:
    dir: checkpoints
    every_steps: 250
    resume: true
  max_steps: 50
