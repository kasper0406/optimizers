# WP1.2 Phase-1 measurement runs: instrumented airbench (plan section 1.2).
#
# The experiment is the IDENTICAL stock WP0.1 airbench recipe (vendored Muon
# lr=0.24 momentum=0.6 nesterov, torch.compile on, vendored data pipeline /
# schedules / eval) with the read-only InstrumentationHub attached to the
# filter-parameter matrices: top-k1=16 tracked singular pairs of the vendored
# Muon momentum buffers + k2=16 bulk probes, per-step raw PRE-momentum
# gradient projections s_i = u^T G v (captured before optimizer2.step),
# T_refresh=50, both betas, per-matrix top sigma and ||G||_F.  HVP callback
# is None on airbench (amplitude-ratio path is the core; HVP is
# validation-only).  Instrumentation must not modify any update.
#
# LAUNCH PRECONDITION (WP1.2, CLAUDE.md): the human-authored, pre-registered
# criteria/phase1_preregistration.md MUST exist (committed, with a timestamp
# predating the first run) before any run of this experiment.  scripts/run.py
# refuses to run 'airbench_instrumented' while that file is missing (scripts
# cannot check git history; the human verifies commit order).  The classifier
# thresholds below are carried in this config for reproducibility and MUST be
# brought in line with the pre-registered values by the human before launch
# -- they are placeholders in the dev-config style until then, never
# agent-chosen science.
#
# Seed policy (CLAUDE.md ground rule 2): WP1.2 is measurement, not
# comparison, and uses dev seeds only -- the sweep below resolves policy
# 'dev' x 20 to exactly seeds 1000-1019 at launch time via scripts/sweep.py.
# Literal seeds < 1000 never appear in configs.  The base 'seed' key below is
# a dev seed for single debug runs; sweep.py strips it and passes each seed
# via `run.py --seed`.
#
# Outputs: one results JSON per run plus a per-direction time-series sidecar
# <results_stem>.instrumentation.json (src/instrument/schema.py).  The three
# plan-section-1.2 plots are generated from a directory of sidecars with:
#   uv run python -m src.instrument.plots results/ plots_out/ --lr 0.24

experiment: airbench_instrumented
seed: 1000
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  tta_level: 2
  # compile: true and normalize_filter_weights: false are forced by the
  # experiment itself (stock vendored-Muon recipe); no overrides here.

instrumentation:
  k1: 16               # top singular pairs of M_t (plan section 1.1)
  k2: 16               # bulk probes, orthogonalized against the top block
  t_refresh: 50        # subspace refresh cadence (steps)
  subspace_iters: 2    # warm-started subspace iterations per refresh
  betas: [0.9, 0.99]   # both EMA timescales (timescale sensitivity is a finding)
  align_min: 0.9       # refresh alignment below this = innovation reset
  snapshot_every: 5    # per-direction stat snapshot cadence (steps)
  seed: 4242           # instrumentation probe RNG (dev seed, >= 1000)
  min_dim: 8           # skip matrices whose flattened min dim is below this
  momentum_key: momentum_buffer
  hvp: false           # HVP probes are Phase-1 VALIDATION ONLY; None on airbench
  classifier:          # sync with criteria/phase1_preregistration.md pre-launch
    tau_sig: 4.0
    tau_noise: 2.0
    rho_osc: 0.5
    n_min: 50
    z_reset: 6.0
    innov_needed: 2
    innov_window: 4

sweep:
  seeds:
    policy: dev
    num_seeds: 20      # resolves to exactly seeds 1000-1019 at launch time
