# EXPLORATORY (Gate-1 amendment A1; NO pre-registered claim): WP2.2 Group 4c
# null ablation (plan section 2.2.4): Routed Muon with the autocorrelation
# signal IGNORED (magnitude-only gate). If this matches full routing, the
# novel per-direction-autocorrelation part is dead even if the method
# "works". This null is only meaningful WITH the noise channel (rho_ignored
# makes the oscillation label unreachable; osc-only + rho_ignored would be
# bit-for-bit stock Muon), so under the Gate-1 oscillation-only scope it
# keeps BOTH channels and moves to the exploratory appendix as the
# companion null of wp22_exploratory_fullrouted.yaml. Eval n=100; identical
# to wp22_exploratory_fullrouted.yaml except rho_ignored: true. The primary
# arm's placebo null is wp22_null_routed_randomgating.yaml (osc-only).
#
# Routing values are frozen at constructor defaults; TBD-CHECK-GATE1 as in
# wp22_headtohead_routed.yaml.
experiment: airbench_smoke
seed: 2212
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: routed
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0
  # -- routing (constructor defaults; TBD-CHECK-GATE1)
  k: 16
  t_refresh: 50
  beta: 0.99
  tau_sig: 4.0
  tau_noise: 2.0
  rho_osc: 0.5
  g_noise: 0.25
  n_min: 25    # Gate-1 A5 activity fix: n_min=50 + T_refresh=50 left routing off ~98% of direction-steps
  align_min: 0.3    # median refresh alignment ~0.42; 0.9 reset every direction every refresh
  enable_noise_channel: true
  enable_oscillation_channel: true
  rho_ignored: true    # <- the ablation: magnitude-only gate
  random_gating: false
  seed: 2600           # optimizer-internal RNG (dev literal, fixed per config)

sweep:
  seeds: eval          # -> seeds 0-99 at launch time; comparison-table set
