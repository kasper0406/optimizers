# WP2.2 Group 2 (fair-tuning stage A, plan section 2.2.2): 3x3 LR x WD grid
# for Routed Muon, SELECTION stage on dev seeds (n=25). Grid identical to
# wp22_tuneA_muon.yaml (the fair comparison: equal tuning effort).
#
# DEVIATION from plan (n=100 everywhere): two-stage tuning to fit the budget
# envelope -- see wp22_tuneA_muon.yaml header and docs/wp22-run-plan.md.
# DEVIATION from plan section 2.1 (sweep g_noise/rho_osc/k): the routing
# hyperparameters are FROZEN at defaults for WP2.2; only lr x wd is swept.
# Flagged in docs/wp22-run-plan.md.
#
# GATE-1 SCOPE NOTE (amendment A1): the stage-A grid itself is unchanged
# (same 3x3 LR x WD axes as wp22_tuneA_muon.yaml, equal tuning effort), but
# every routed row is OSC-ONLY (enable_noise_channel: false) -- the tuned
# optimizer must be the same optimizer the primary claim is about.
#
# Routing values are the src/optim/routed.py constructor defaults;
# TBD-CHECK-GATE1 as in wp22_headtohead_routed.yaml.
experiment: airbench_smoke
seed: 2207
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: routed
  lr: 0.24             # overridden by the grid
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0    # overridden by the grid
  # -- routing (frozen at constructor defaults; TBD-CHECK-GATE1)
  k: 16
  t_refresh: 50
  beta: 0.99
  tau_sig: 4.0
  tau_noise: 2.0
  rho_osc: 0.5
  g_noise: 0.25
  n_min: 50
  align_min: 0.9
  enable_noise_channel: false        # <- Gate-1 A1: oscillation-only primary
  enable_oscillation_channel: true
  rho_ignored: false
  random_gating: false
  seed: 2600           # optimizer-internal RNG (dev literal, fixed per config)

sweep:
  seeds:
    policy: dev
    num_seeds: 25      # -> seeds 1000-1024 at launch time (selection stage)
  grid:
    optimizer.lr: [0.12, 0.24, 0.48]
    optimizer.weight_decay: [0.0, 0.004, 0.008]
