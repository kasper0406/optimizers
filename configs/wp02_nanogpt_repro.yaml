# WP0.2 — modded-nanogpt record reproduction (pinned record 2025-07-12_BosAlign).
#
# ============================ DEVIATION HEADER ==============================
# This config is RECORD-FAITHFUL except for the one structural change WP0.2
# exists to make: the record's 8-GPU token batch is reproduced on fewer GPUs
# by gradient accumulation.
#
#   record:  8 devices x 1 micro-batch  x 48Ki tokens = 393,216 tokens/step
#   here:    1 device  x 8 micro-batches x 48Ki tokens = 393,216 tokens/step
#
# Micro-losses are scaled by 1/8 before backward so the optimizer sees exactly
# the record's gradient (proof: src/nanogpt/config.py module docstring).
# Everything else — architecture, Muon(lr=0.05, momentum=0.95, wd=0.0) +
# DistAdam(lr=0.008, betas=(0.8,0.95), eps=1e-10, wd=0.0), the LR/momentum/
# window schedules, the BOS-aligned data pipeline, the fixed 10,485,760-token
# validation — is the record's own code (src/nanogpt/, `RECORD:` line refs).
#
# NOT-RECORD-FAITHFUL knobs, all OFF here:
#   precision_mode: bf16   -> LM head leaves FP8. Required on A100/A6000, which
#                             cannot run torch._scaled_mm float8. CHANGES
#                             NUMERICS. Use only if no H100-class GPU is
#                             available, and say so in the report.
#   attention_impl: sdpa   -> dense-mask fallback; CPU tests only.
#   max_steps              -> truncates the run; a truncated run is a smoke
#                             run, never a reproduction.
# Any of these flips `metrics.record_faithful` to false and is listed in
# `metrics.deviations` in the results JSON.
#
# WHICH RECORD LOG: the 20 same-script validation logs in
# records/track_1_short/2025-07-12_BosAlign/ (md5 5ffba04f..., mean 3.2791,
# std 0.0013) — NOT the 07/13 retiming log c1fd8a38..., whose refactored
# script has a different LR floor (0.1 vs the record's 0.05). See
# docs/nanogpt-port.md and src/nanogpt/__init__.py.
# ============================================================================
#
# Data prerequisite (~1.8 GB):
#   uv run python scripts/fetch_fineweb.py --config configs/wp02_nanogpt_repro.yaml
#
# Launch (human, per the compute boundary — 1 H100-class GPU):
#   bash scripts/launch_cloud.sh run configs/wp02_nanogpt_repro.yaml
# On 2 GPUs, set device_count: 2 and launch under torchrun:
#   torchrun --nproc_per_node=2 scripts/run.py configs/wp02_nanogpt_repro.yaml
#
# Metric of record: STEPS TO VAL LOSS 3.28 (metrics.steps_to_target_loss),
# plus the val-loss-vs-tokens curve for the overlay against the record trace
# (scripts/analyze_nanogpt.py).

experiment: nanogpt
device: auto            # CUDA required; this tier does not run on CPU/MPS
seed: 1000              # dev seed (>= 1000); eval seeds are launcher-resolved

nanogpt:
  # --- port knobs ---------------------------------------------------------
  device_count: 1       # -> accumulation factor 8; tokens/step stays 393,216
  precision_mode: fp8   # record. Switch to bf16 ONLY on non-H100-class GPUs.
  attention_impl: flex  # record (FlexAttention block masks)
  compile: true         # record (torch.compile(model, dynamic=False))
  warmup_steps: 10      # record kernel warmup; state restored, no ML effect

  # --- record values, restated explicitly so a drift is visible in a diff ---
  num_iterations: 1750  # RECORD:574
  cooldown_frac: 0.45   # RECORD:575
  min_lr_frac: 0.05     # RECORD:674
  val_loss_every: 125   # RECORD:576
  val_tokens: 10485760  # RECORD:572 — fixed, never change
  train_seq_len: 49152  # RECORD:579  (48*1024)
  val_seq_len: 262144   # RECORD:580  (4*64*1024)
  muon_lr: 0.05         # RECORD:645
  muon_momentum: 0.95   # RECORD:645
  muon_weight_decay: 0.0
  adam_lr: 0.008        # RECORD:644
  adam_betas: [0.8, 0.95]
  adam_eps: 1.0e-10
  adam_weight_decay: 0.0
  target_val_loss: 3.28 # vendor/modded-nanogpt/README.md:3

  # Spot-tier resume (docs/hyperstack-runbook.md). VM-local; never synced.
  checkpoint:
    dir: checkpoints
    every_steps: 250
    resume: true
