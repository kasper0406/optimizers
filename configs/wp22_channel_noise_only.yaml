# EXPLORATORY (Gate-1 amendment A1; NO pre-registered claim): Routed Muon
# with the NOISE channel only (oscillation channel off). The Gate-1 record
# found no detectable signal population (signal/noise separation not
# observed), so the noise channel has no empirical basis and this arm is
# demoted to the exploratory appendix (plan sections 2.2 / 2.4). Results are
# reported descriptively; they cannot satisfy or fail the Phase-2
# pre-registered criteria. Eval n=100; identical to
# wp22_exploratory_fullrouted.yaml except enable_oscillation_channel: false.
#
# Routing values are frozen at constructor defaults; TBD-CHECK-GATE1 as in
# wp22_headtohead_routed.yaml.
experiment: airbench_smoke
seed: 2215
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: routed
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0
  # -- routing (constructor defaults; TBD-CHECK-GATE1)
  k: 16
  t_refresh: 50
  beta: 0.99
  tau_sig: 4.0
  tau_noise: 2.0
  rho_osc: 0.5
  g_noise: 0.25
  n_min: 50
  align_min: 0.9
  enable_noise_channel: true
  enable_oscillation_channel: false  # <- noise-only variant
  rho_ignored: false
  random_gating: false
  seed: 2600           # optimizer-internal RNG (dev literal, fixed per config)

sweep:
  seeds: eval          # -> seeds 0-99 at launch time; comparison-table set
