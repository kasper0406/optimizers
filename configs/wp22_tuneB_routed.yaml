# WP2.2 Group 3 (fair-tuning stage B, plan section 2.2.2): Routed Muon at the
# stage-A argmax (lr, wd), full eval n=100. This is the "fair comparison"
# entry for Routed Muon in the comparison table.
#
# PLACEHOLDER -- NOT RUNNABLE AS WRITTEN. The TBD-STAGE-A values below are
# filled from the stage-A aggregate (wp22_tuneA_routed.yaml on dev seeds) via:
#   uv run python scripts/plan_wp22.py fill-tuneB \
#       --csv <stageA_aggregate.csv> --manifest <stageA_manifest.json> \
#       --target configs/wp22_tuneB_routed.yaml
# which replaces the TBD strings and clears the status marker. Attempting to
# run before filling fails at optimizer construction (lr is a string).
#
# Routing values are frozen at constructor defaults; TBD-CHECK-GATE1 as in
# wp22_headtohead_routed.yaml.
experiment: airbench_smoke
status: "PLACEHOLDER-TBD-STAGE-A -- not runnable; fill via scripts/plan_wp22.py from the stage-A aggregate"
seed: 2209
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: routed
  lr: TBD-STAGE-A            # argmax accuracy over the wp22_tuneA_routed grid
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: TBD-STAGE-A  # argmax accuracy over the wp22_tuneA_routed grid
  # -- routing (frozen at constructor defaults; TBD-CHECK-GATE1)
  k: 16
  t_refresh: 50
  beta: 0.99
  tau_sig: 4.0
  tau_noise: 2.0
  rho_osc: 0.5
  g_noise: 0.25
  n_min: 50
  align_min: 0.9
  enable_noise_channel: true
  enable_oscillation_channel: true
  rho_ignored: false
  random_gating: false
  seed: 2600           # optimizer-internal RNG (dev literal, fixed per config)

sweep:
  seeds: eval          # -> seeds 0-99 at launch time; comparison-table set
