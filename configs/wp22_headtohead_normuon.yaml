# WP2.2 Group 1 (head-to-head, plan section 2.2.3): NorMuon baseline
# (arXiv:2510.05491, Algorithm 1) on the airbench_smoke harness.
# Comparison-table run: eval seed policy, single GPU type (A6000 class),
# recipe identical to wp22_headtohead_muon.yaml.
#
# Settings carried over from the WP0.4 smoke config
# (configs/dev/airbench_smoke_normuon.yaml): beta1 matches the Muon record
# momentum on this harness; beta2 is the paper default. The eta^ rescaling
# changes the effective step scale vs Muon, so lr is the WP0.4 dev starting
# point; no matched LR x WD sweep is budgeted for baselines (flagged
# deviation in docs/wp22-run-plan.md).
experiment: airbench_smoke
seed: 2205
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: normuon
  lr: 0.02  # dev LR-probe argmax (lightly tuned; see lrprobe/lrprobe2 sweeps)
  beta1: 0.6
  beta2: 0.95
  ns_steps: 3
  weight_decay: 0.0

sweep:
  seeds: eval          # -> seeds 0-99 at launch time; comparison-table set
