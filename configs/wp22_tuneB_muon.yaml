# WP2.2 Group 3 (fair-tuning stage B, plan section 2.2.2): stock Muon at the
# stage-A argmax (lr, wd), full eval n=100. This is the "fair comparison"
# entry for Muon in the comparison table.
#
# PLACEHOLDER -- NOT RUNNABLE AS WRITTEN. The TBD-STAGE-A values below are
# filled from the stage-A aggregate (wp22_tuneA_muon.yaml on dev seeds) via:
#   uv run python scripts/plan_wp22.py fill-tuneB \
#       --csv <stageA_aggregate.csv> --manifest <stageA_manifest.json> \
#       --target configs/wp22_tuneB_muon.yaml
# which replaces the TBD strings and clears the status marker. Attempting to
# run before filling fails at optimizer construction (lr is a string).
experiment: airbench_smoke
status: "PLACEHOLDER-TBD-STAGE-A -- not runnable; fill via scripts/plan_wp22.py from the stage-A aggregate"
seed: 2208
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: muon
  lr: TBD-STAGE-A            # argmax accuracy over the wp22_tuneA_muon grid
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: TBD-STAGE-A  # argmax accuracy over the wp22_tuneA_muon grid

sweep:
  seeds: eval          # -> seeds 0-99 at launch time; comparison-table set
