# Gate-2 secondary-criterion completion: 2x-record-LR (0.48) eval
# confirmation, n=100 eval seeds, seed-paired vs the routed h2h arm.
experiment: airbench_smoke
seed: 2202
device: cuda
data:
  root: data/cifar10
train:
  epochs: 8
  batch_size: 2000
recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2
optimizer:
  name: routed
  lr: 0.48
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0
  k: 16
  t_refresh: 50
  beta: 0.99
  tau_sig: 4.0
  tau_noise: 2.0
  rho_osc: 0.5
  g_noise: 0.25
  n_min: 25
  align_min: 0.3
  enable_noise_channel: false
  enable_oscillation_channel: true
  rho_ignored: false
  random_gating: false
  seed: 2600
sweep:
  seeds: eval
