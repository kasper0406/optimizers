# WP2.2 Group 4d (null ablation / placebo, plan section 2.2.4): Routed Muon
# with RANDOM gating -- the same fraction of directions gated, chosen
# randomly. Placebo control for the routing decision itself. Eval n=100
# comparison-table run; identical to wp22_headtohead_routed.yaml except
# random_gating: true.
#
# GATE-1 SCOPE (amendment A1): OSC-ONLY like the primary arm it placebos --
# the permuted gain multiset is the oscillation-channel gains
# (enable_noise_channel: false).
#
# LIMITATION (flagged in docs/wp22-run-plan.md): optimizer.seed drives the
# placebo RNG and is a fixed dev literal, so the random gating pattern's RNG
# stream does not vary across the 100 eval seeds (model init / data order
# still vary via `run.py --seed`).
#
# Routing values are frozen at constructor defaults; TBD-CHECK-GATE1 as in
# wp22_headtohead_routed.yaml.
experiment: airbench_smoke
seed: 2213
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: routed
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0
  # -- routing (constructor defaults; TBD-CHECK-GATE1)
  k: 16
  t_refresh: 50
  beta: 0.99
  tau_sig: 4.0
  tau_noise: 2.0
  rho_osc: 0.5
  g_noise: 0.25
  n_min: 25    # Gate-1 A5 activity fix: n_min=50 + T_refresh=50 left routing off ~98% of direction-steps
  align_min: 0.3    # median refresh alignment ~0.42; 0.9 reset every direction every refresh
  enable_noise_channel: false        # <- Gate-1 A1: placebo of the osc-only arm
  enable_oscillation_channel: true
  rho_ignored: false
  random_gating: true  # <- the placebo: same gated fraction, random choice
  seed: 2600           # optimizer-internal RNG (dev literal, fixed per config)

sweep:
  seeds: eval          # -> seeds 0-99 at launch time; comparison-table set
