# Phase-1 disambiguation ablation A: WITH-REPLACEMENT batch sampling
# (WP1.2 follow-up; dev seeds; NOT a Gate-1 measurement config).
#
# Motivation (reports/wp12-phase1-measurement.md, caveat 2): 60-89% of
# direction-snapshots showed lag-1 autocorrelation rho < -0.2 -- broader than
# an edge-of-stability story predicts, including in bulk probes.  The vendored
# airbench CifarLoader samples batches WITHOUT replacement within an epoch
# (one randperm partitioned into batches), which can induce negative lag-1
# correlation in the gradient-noise component independent of curvature.  This
# config reruns the WP1.2 instrumented recipe with recipe.sampling:
# with_replacement so each training step draws its batch indices i.i.d. WITH
# replacement from the training set, removing that mechanism.  Comparing the
# phase-wise rho < -0.2 fractions of these sidecars against the WP1.2
# baseline sidecars (scripts/analyze_disambiguation.py) separates the
# sampling confounder from curvature-driven oscillation.
#
# Sampling deviation, precisely (src/optim/airbench_zoo.py,
# iter_batches_with_replacement): the per-epoch augmentation treatment is the
# vendored one, unchanged -- identical epoch-0 preprocessing cache (normalize
# -> pre-flip -> reflect pad), identical per-epoch random crop of the whole
# padded set, identical deterministic every-other-epoch full flip, identical
# number of batches per epoch.  The ONLY change is the final index draw:
# torch.randint i.i.d. per batch instead of a partitioned torch.randperm per
# epoch.  Consequences: (1) an image may appear 0 or several times per epoch,
# even within one batch; repeated draws within an epoch share the SAME
# augmentation realization (crop/flip are materialized once per epoch for the
# whole set, as in the reference, then indexed); (2) the device RNG stream
# downstream differs from the reference stream (inherent to any sampling
# change).
#
# Everything else is byte-identical to configs/wp12_airbench_instrumented.yaml
# (same k1/k2, T_refresh, betas, snapshot cadence, classifier thresholds,
# stock vendored-Muon recipe with compile on) except: dev sweep of 3 seeds
# 1100-1102 (disjoint from the WP1.2 dev seeds 1000-1019), and this sampling
# flag.  HVP stays off here (see instrumented_airbench_hvp.yaml).
#
# LAUNCH PRECONDITION (WP1.2, CLAUDE.md): criteria/phase1_preregistration.md
# must exist; scripts/run.py enforces this for airbench_instrumented.
#
# Launch (GPU box):
#   uv run python scripts/sweep.py configs/dev/instrumented_airbench_withreplacement.yaml
#   bash sweeps/instrumented_airbench_withreplacement/run_all.sh

experiment: airbench_instrumented
seed: 1100
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  tta_level: 2
  sampling: with_replacement   # the ONE deviation from the WP1.2 baseline
  # compile: true and normalize_filter_weights: false are forced by the
  # experiment itself (stock vendored-Muon recipe); no overrides here.

instrumentation:
  k1: 16               # top singular pairs of M_t (plan section 1.1)
  k2: 16               # bulk probes, orthogonalized against the top block
  t_refresh: 50        # subspace refresh cadence (steps)
  subspace_iters: 2    # warm-started subspace iterations per refresh
  betas: [0.9, 0.99]   # both EMA timescales (timescale sensitivity is a finding)
  align_min: 0.9       # refresh alignment below this = innovation reset
  snapshot_every: 5    # per-direction stat snapshot cadence (steps)
  seed: 4242           # instrumentation probe RNG (dev seed, >= 1000)
  min_dim: 8           # skip matrices whose flattened min dim is below this
  momentum_key: momentum_buffer
  hvp: false           # HVP probes are in the sibling hvp config, not here
  classifier:          # identical to the WP1.2 baseline config (occupancy labels only)
    tau_sig: 4.0
    tau_noise: 2.0
    rho_osc: 0.5
    n_min: 50
    z_reset: 6.0
    innov_needed: 2
    innov_window: 4

sweep:
  seeds: [1100, 1101, 1102]   # explicit dev seeds, disjoint from WP1.2's 1000-1019
