# Program #6 -- Muon stability frontier in (lr x batch).
# Pre-registration: reports/stability-frontier-preregistration.md (committed
# BEFORE any run; predictions P1/P2/P3 live there, not here).
#
# The Gate-2 stress test located a useful-lr shoulder between 2x and 3x the
# record lr at the record batch size (2000) with no divergence cliff to 6x;
# HVP eta*lambda ~65 rules out Euclidean curvature as the binding constraint
# and the lr-ladder ruled out a smoothness plateau in either norm.  This grid
# adds the batch axis: if minibatch noise sets the frontier the shoulder lr
# rises with B (alpha ~ 0.5 in lr* ~ B^alpha at fixed sample budget); if a
# deterministic landscape property sets it, alpha ~ 0.
#
# Axes:
#   train.batch_size: {500, 1000, 2000, 4000, 8000}   (record = 2000; epochs
#     pinned at 8 so every cell sees the same 8 x 50k sample budget; the
#     vendored schedule is step-normalized and adapts; stock recipe already
#     batch-scales the SGD weight decay)
#   probe_overrides.lr: 0.24 x {0.5, 1, 1.5, 2, 2.5, 3, 4, 6}   (Muon groups
#     only -- Gate-1 amendment A4 sanction; SGD side stays stock, same
#     isolation as the Gate-2 stress test)
#
# Instrumentation identical to instrumented_airbench_smoothness_lr_ladder.yaml
# (WP1.2 stack + HVP + smoothness; eager -- double-backward forbids compile).
# t_refresh/snapshot/t_meas are in STEPS, so per-run measurement counts scale
# with steps (~1/B); the P2 analysis window is defined in the pre-registration
# and B=8000 (50 steps) is excluded from P2 in advance.
#
# Seeds 1400-1401: fresh dev block, disjoint from 1000-1019, 1100-1102,
# 1200-1202, 1300-1311.  Seed 1402 is reserved for crossing-adjacent cells
# per the pre-registration's caveat; nothing else may be added.
#
# LAUNCH PRECONDITION (WP1.2, CLAUDE.md): criteria/phase1_preregistration.md
# must exist; scripts/run.py enforces this for airbench_instrumented.
#
# Launch (this machine, 2x RTX 5090):
#   uv run python scripts/sweep.py configs/dev/frontier_lrxbatch.yaml
#   # then split sweeps/frontier_lrxbatch/run_all.sh across the two GPUs
# (80 runs = 5 batch sizes x 8 lr rungs x 2 seeds)

experiment: airbench_instrumented
seed: 1400
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000     # overridden per cell by the sweep grid below

recipe:
  tta_level: 2
  compile: false       # REQUIRED with hvp: true (no double-backward through
                       # torch.compile); same documented deviation as the
                       # HVP and smoothness-ladder configs.

probe_overrides:
  lr: 0.24             # overridden per cell by the sweep grid below

instrumentation:
  k1: 16
  k2: 16
  t_refresh: 50
  subspace_iters: 2
  betas: [0.9, 0.99]
  align_min: 0.9
  snapshot_every: 5
  seed: 4242
  min_dim: 8
  momentum_key: momentum_buffer
  hvp: true
  smoothness:
    enabled: true
    t_meas: 5
    grad_source: recompute
  frozen_probes:
    enabled: false     # program #4 closed this line; not part of P1/P2/P3
  classifier:
    tau_sig: 4.0
    tau_noise: 2.0
    rho_osc: 0.5
    n_min: 50
    z_reset: 6.0
    innov_needed: 2
    innov_window: 4

sweep:
  seeds: [1400, 1401]
  grid:
    train.batch_size: [500, 1000, 2000, 4000, 8000]
    probe_overrides.lr: [0.12, 0.24, 0.36, 0.48, 0.60, 0.72, 0.96, 1.44]
