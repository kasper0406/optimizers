# WP1.1 dev config: instrumented synthetic-MLP smoke, CPU-runnable.
# Used by scripts/bench_overhead.py (mode: synthetic) and for local debugging
# of the instrumentation path on the dev Mac (no CUDA required).
#
# Classifier thresholds are DEV PLACEHOLDERS (see instrumented_airbench_muon.yaml).
experiment: instrumented_mlp_smoke
seed: 1600
device: cpu

model:
  # Layer widths chosen to mirror the airbench94 filter-matrix shapes after
  # the len(p) x -1 flattening: (64, 216), (256, 576), (256, 2304), (10, 256).
  matrix_shapes:
    - [64, 216]
    - [256, 576]
    - [256, 2304]
    - [256, 2304]

train:
  steps: 200
  batch_size: 64

optimizer:
  name: muon
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0

instrumentation:
  k1: 16
  k2: 16
  t_refresh: 50
  subspace_iters: 2
  betas: [0.9, 0.99]
  align_min: 0.9       # DEV PLACEHOLDER
  snapshot_every: 10
  seed: 4242
  min_dim: 8
  momentum_key: momentum_buffer
  hvp: false
  classifier:          # DEV PLACEHOLDERS
    tau_sig: 4.0
    tau_noise: 2.0
    rho_osc: 0.5
    n_min: 50
    z_reset: 6.0
    innov_needed: 2
    innov_window: 4
