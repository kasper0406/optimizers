# CONTROL ARM (added 2026-07-20 after the first probe results): identical
# stock-Muon twins. Measures the floor of the divergence metric under GPU
# nondeterminism + chaotic amplification. Without this the intervention
# arms' rel_dist ~0.95-0.99 cannot be attributed to the intervention.
experiment: probe_divergence
seed: 1605
device: cuda
harness: airbench
steps: 200

data:
  root: data/cifar10

train:
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  tta_level: 2

twin_a:
  name: muon
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3

twin_b:
  name: muon
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3
