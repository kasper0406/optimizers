# WP0.4 airbench smoke: reference Muon on the airbench94 recipe.
# Optimizer hyperparameters are the airbench94_muon.py record values
# (vendor/airbench/airbench94_muon.py:363 -- lr 0.24, momentum 0.6, nesterov,
# NS steps 3), so this config should land near the 94% tier.
# Requires CUDA (see src/optim/airbench_zoo.py). Dev seed (>= 1000).
experiment: airbench_smoke
seed: 1500
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true   # airbench94_muon.py:83, applied harness-side
  compile: false
  tta_level: 2

optimizer:
  name: muon
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0
