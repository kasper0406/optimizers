# WP0.4 airbench smoke: NorMuon (arXiv:2510.05491, Algorithm 1) on the
# airbench94 recipe. beta1 matches the Muon record momentum on this harness;
# beta2 is the paper default. The eta^ rescaling (0.2*eta*sqrt(mn)/||O||_F)
# changes the effective step scale vs Muon, so lr is an UNTUNED dev starting
# point. Requires CUDA. Dev seed (>= 1000).
experiment: airbench_smoke
seed: 1504
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: normuon
  lr: 0.24
  beta1: 0.6
  beta2: 0.95
  ns_steps: 3
  weight_decay: 0.0
