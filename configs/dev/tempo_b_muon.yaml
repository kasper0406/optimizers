# Program #8 Phase B arm: stock Muon baseline (paired dev seeds).
# Pre-registration: reports/tempo-phase-a.md section 3 (committed first).
experiment: airbench_smoke
seed: 1420
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: muon
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0

sweep:
  seeds: [1420, 1421, 1422, 1423, 1424, 1425, 1426, 1427, 1428, 1429]
  grid:
    optimizer.lr: [0.24, 0.48, 0.72, 0.96]
