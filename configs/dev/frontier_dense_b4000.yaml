# Program #6b Part 1 -- dense-ladder alpha sharpening at B=4000.
# Pre-registration: reports/frontier-sharpening-preregistration.md
# (committed BEFORE any run; interpolated-crossing estimator defined there).
# Rungs are x1.15-spaced and bracket the program-#6 crossing region for this
# batch size; the first rung is the #6 accuracy-peak anchor defining ref(B).
# Instrumentation identical to configs/dev/frontier_lrxbatch.yaml.
# Seeds 1410-1414: fresh dev block (1400-1402 used by program #6).

experiment: airbench_instrumented
seed: 1410
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 4000

recipe:
  tta_level: 2
  compile: false       # REQUIRED with hvp: true

probe_overrides:
  lr: 0.24             # overridden per rung by the sweep grid below

instrumentation:
  k1: 16
  k2: 16
  t_refresh: 50
  subspace_iters: 2
  betas: [0.9, 0.99]
  align_min: 0.9
  snapshot_every: 5
  seed: 4242
  min_dim: 8
  momentum_key: momentum_buffer
  hvp: true
  smoothness:
    enabled: true
    t_meas: 5
    grad_source: recompute
  frozen_probes:
    enabled: false
  classifier:
    tau_sig: 4.0
    tau_noise: 2.0
    rho_osc: 0.5
    n_min: 50
    z_reset: 6.0
    innov_needed: 2
    innov_window: 4

sweep:
  seeds: [1410, 1411, 1412, 1413, 1414]
  grid:
    probe_overrides.lr: [0.36, 0.55, 0.64, 0.73, 0.84, 0.97, 1.11]
