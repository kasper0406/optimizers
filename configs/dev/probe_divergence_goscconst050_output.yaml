# Twin-trajectory divergence probe (brainstorm program #1: compounding).
# CONSTANT-GAIN OUTPUT arm (the cleanest half of the matched-gain comparison):
# twin B is Routed Muon with a FIXED oscillation gain g_osc_const=0.5 applied
# OUTPUT-side (edits O_t only). Pairs with probe_divergence_goscconst050_state
# .yaml, which is byte-for-byte identical except state_damping -- so the ONLY
# difference between the two runs is where the identical constant gain is
# applied. Oscillation-only, record config + Gate-1 A5 activity fix; twin A is
# stock Muon. 200-step record-config scope.
#
# PRE-REGISTERED PREDICTION (verbatim):
#   Output-mode relative divergence stays small (same order as the
#   goscconst-output arm's known behavioral equivalence, i.e. well below 1e-2
#   by the end of the 200-step run) while state-mode divergence grows with step
#   count and ends at least 10x the output-mode divergence at matched gain. If
#   instead both are small or both are large, the compounding explanation of
#   the Gate-2 null is wrong and must be reported as refuted.
#
# Dev seed (>= 1000); measurement probe, never a comparison-table entry.
experiment: probe_divergence
seed: 1602
device: cuda
harness: airbench
steps: 200

data:
  root: data/cifar10

train:
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  tta_level: 2

twin_a:
  name: muon
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3

twin_b:
  name: routed
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0
  # -- routing (record config + Gate-1 A5 activity fix), constant gain, OUTPUT
  k: 16
  t_refresh: 50
  beta: 0.99
  tau_sig: 4.0
  tau_noise: 2.0
  rho_osc: 0.5
  g_noise: 0.25
  n_min: 25
  align_min: 0.3
  enable_noise_channel: false       # oscillation-only (Gate-1 A1)
  enable_oscillation_channel: true
  g_osc_const: 0.5                  # fixed attenuation (Gate-1 A2)
  state_damping: false              # <- OUTPUT-side: edits O_t, not the buffer
  seed: 2600
