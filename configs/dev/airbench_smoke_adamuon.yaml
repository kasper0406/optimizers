# WP0.4 airbench smoke: AdaMuon (arXiv:2507.11005, Algorithm 1) on the
# airbench94 recipe. The RMS-aligned rescaling targets Adam-like update RMS
# (0.2), so lr lives on an Adam-like scale; lr here is an UNTUNED dev starting
# point. Requires CUDA. Dev seed (>= 1000).
experiment: airbench_smoke
seed: 1503
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true
  compile: false
  tta_level: 2

optimizer:
  name: adamuon
  lr: 0.01
  momentum: 0.6
  ns_steps: 3
  weight_decay: 0.0
