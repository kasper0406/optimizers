# Muon stability-law measurement: GENERALIZED (spectral) directional
# smoothness + Euclidean eta*lambda + frozen-probe long integration, on ONE
# run set.  Dev seeds; a measurement config, NOT a comparison-table config and
# NOT a gate input.
#
# ---------------------------------------------------------------------------
# PRE-REGISTERED QUESTIONS (stated before the runs; this file answers neither
# -- it produces the measurement.  No threshold here decides anything, and the
# agent evaluates no gate.)
#
# Q1 (spectral stability law; src/instrument/smoothness.py).
#   Does the GENERALIZED (spectral-norm) directional smoothness of the loss,
#   measured along the actual optimizer trajectory,
#
#       D_smooth_spectral = 2 [ L(W+D) - L(W) - <grad L(W), D> ] / ||D||_2^2 ,
#       D = the actual applied update to that matrix on that step,
#
#   equilibrate at c / lr for some constant c -- the Muon analogue of GD's 2
#   and Adam's ~38 -- while the EUCLIDEAN quantity (same numerator over
#   ||D||_F^2, and the HVP-measured eta*lambda of the tracked directions) does
#   not?  The reported signature is a plateau of the dimensionless product
#   lr * D_smooth_spectral.  Because "equilibrates at c/lr" is an lr-SCALING
#   claim, the plateau constant must be the SAME at 0.5x, 1x and 2x the record
#   lr -- tested by the companion ladder config
#   configs/dev/instrumented_airbench_smoothness_lr_ladder.yaml.
#
# Q2 (frozen-probe long integration; src/instrument/tracker.py,
#     FrozenProbeBank).
#   Along a frozen, never-refreshed, never-reset random probe direction, does
#   the cumulative t-statistic of the gradient projection grow like sqrt(t)
#   (persistent signal: drift accumulates ~T, zero-mean noise ~sqrt(T)) or
#   stay flat/bounded at the white-noise scale?  Does ANY frozen probe cross
#   the conventional |t| >= 4 by the end of the run?  The contrast is with the
#   tracked/bulk tiers, whose t is structurally capped (bounded EMA window,
#   plus innovation resets).
#
# Both measurements ride the same 200 training steps, so Q1's stability
# quantity and Q2's signal quantity are measured on identical trajectories,
# alongside the HVP eta*lambda that motivated Q1.
# ---------------------------------------------------------------------------
#
# Context: reports/wp12-phase1-measurement.md finding 2 (training stable at
# HVP-measured Euclidean eta*lambda ~ 65, no divergence to 6x lr) is data on
# the momentum + minibatch regime that Islamov, Crawshaw, Cohen & Gower
# (arXiv:2603.05002, ICML'26 oral) name as their open problem; their theory
# says the governing quantity is directional smoothness in the UPDATE's own
# norm.  docs/litreview/d-normalized-stability-theory.md,
# docs/litreview/g-persistent-probes.md.
#
# HONEST CAVEAT, restated here because it must travel with the numbers: the
# smoothness estimate is a MINIBATCH estimate (all three terms on the step's
# own batch, one well-defined function, but not the full-batch quantity the
# theory is stated for), and the airbench loss is SUM-reduced over the batch,
# so c is quoted in that convention (batch_size is recorded in the sidecar).
#
# DEVIATION from the stock WP1.2 recipe: recipe.compile: false, required by
# both the HVP double-backward and the functional_call smoothness probe
# (identical rationale and identical deviation as
# configs/dev/instrumented_airbench_hvp.yaml).  Wall-clock changes; the
# recipe's math does not.  These seeds enter no comparison table.
#
# COST per run beyond stock instrumentation: HVP as in the hvp config (4 fp32
# graphs + ~768 HVP backwards); smoothness at t_meas=5 over 200 steps = 40
# measured steps x (1 fp32 fwd+bwd + one fp32 fwd per filter matrix);
# frozen probes are O(k3) projections per matrix per step, no extra passes.
#
# LAUNCH PRECONDITION (WP1.2, CLAUDE.md): criteria/phase1_preregistration.md
# must exist; scripts/run.py enforces this for airbench_instrumented.
#
# Launch (GPU box):
#   uv run python scripts/sweep.py configs/dev/instrumented_airbench_smoothness.yaml
#   bash sweeps/instrumented_airbench_smoothness/run_all.sh

experiment: airbench_instrumented
seed: 1300
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  tta_level: 2
  compile: false       # REQUIRED by hvp: true AND by smoothness (see header)

instrumentation:
  k1: 16               # top singular pairs of M_t (plan section 1.1)
  k2: 16               # bulk probes, orthogonalized against the top block
  t_refresh: 50        # subspace refresh cadence; HVP once per pair per refresh
  subspace_iters: 2
  betas: [0.9, 0.99]
  align_min: 0.9
  snapshot_every: 5    # also the frozen-probe cumulative-t snapshot cadence
  seed: 4242           # instrumentation probe RNG (dev seed, >= 1000)
  min_dim: 8
  momentum_key: momentum_buffer
  hvp: true            # Euclidean eta*lambda on the SAME runs (Q1 comparison)
  smoothness:          # Q1: generalized (spectral) directional smoothness
    enabled: true
    t_meas: 5          # measure every 5 steps
    grad_source: recompute   # all three terms from one fp32 loss (see module)
  frozen_probes:       # Q2: unbounded-window third tier
    enabled: true
    k3: 16             # frozen random probe directions per matrix
    max_lag: 8         # Newey-West Bartlett bandwidth cap
    decimate: 1        # keep every raw projection (200 steps: small)
  classifier:          # identical to the WP1.2 baseline config
    tau_sig: 4.0
    tau_noise: 2.0
    rho_osc: 0.5
    n_min: 50
    z_reset: 6.0
    innov_needed: 2
    innov_window: 4

sweep:
  seeds: [1300, 1301, 1302]   # dev seeds, disjoint from 1000-1019/1100-1102/1200-1202
