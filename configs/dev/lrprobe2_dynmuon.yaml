# LR-probe extension for dynmuon: first probe hit its grid boundary.
experiment: airbench_smoke
seed: 1700
device: cuda
data:
  root: data/cifar10
train:
  epochs: 8
  batch_size: 2000
recipe:
  normalize_filter_weights: true
  compile: true
  tta_level: 2
optimizer:
  name: dynmuon
  momentum: 0.6
  nesterov: true
  weight_decay: 0.0
  total_steps: 200
  p_max: 1.0
  p_min: -0.25
  tau_ratio: 0.02
  width_ratio: 0.08
  adjust_lr: spectral_norm
  spectral_impl: poly
sweep:
  seeds:
    policy: dev
    num_seeds: 5
  grid:
    optimizer.lr:
    - 1.0
    - 2.0
    - 4.0
