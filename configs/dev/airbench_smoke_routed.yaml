# WP2.1 airbench smoke: Routed Muon v0 on the airbench94 recipe.
# Muon-side hyperparameters are the airbench94_muon.py record values
# (lr 0.24, momentum 0.6, nesterov, NS steps 3), identical to
# airbench_smoke_muon.yaml so the smoke run is directly comparable.
# Routing hyperparameters are the plan section 2.1 defaults (tau_* / rho_osc
# are DEV PLACEHOLDERS matching the instrumented dev configs; Phase-1-informed
# values arrive with Gate 1). Requires CUDA (see src/optim/airbench_zoo.py).
# Dev seed (>= 1000).
experiment: airbench_smoke
seed: 1600
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  normalize_filter_weights: true   # airbench94_muon.py:83, applied harness-side
  compile: false
  tta_level: 2

optimizer:
  name: routed
  lr: 0.24
  momentum: 0.6
  nesterov: true
  ns_steps: 3
  weight_decay: 0.0
  # -- routing (plan section 2.1 defaults; sweep-eligible: g_noise, rho_osc, k)
  k: 16
  t_refresh: 50
  beta: 0.99
  tau_sig: 4.0          # DEV PLACEHOLDER
  tau_noise: 2.0        # DEV PLACEHOLDER
  rho_osc: 0.5          # DEV PLACEHOLDER
  g_noise: 0.25
  n_min: 50
  align_min: 0.9
  enable_noise_channel: true
  enable_oscillation_channel: true
  rho_ignored: false
  random_gating: false
  seed: 1600            # optimizer-internal RNG (subspace init / placebo gating)
