# 50-STEP LOCAL TIMING PROBE for the 2x RTX 5090 box (not a reproduction).
# wp02_nanogpt_probe50.yaml + the two harness-standard local deviations:
# head_chunk_rows (32 GB memory path, PORT CHANGE P5) and
# fp32_embed_grad_accum (the WP0.2-diagnosed accumulation fix).
experiment: nanogpt
device: auto
seed: 1710
nanogpt:
  head_chunk_rows: 8192   # PORT CHANGE P5: 32 GB memory path (6 train chunks, 32 val chunks)
  fp32_embed_grad_accum: true   # harness standard per project-state next-step 4
  device_count: 1
  precision_mode: fp8
  attention_impl: flex
  compile: true
  warmup_steps: 10
  num_iterations: 1750
  cooldown_frac: 0.45
  min_lr_frac: 0.05
  val_loss_every: 125
  val_tokens: 10485760
  train_seq_len: 49152
  val_seq_len: 262144
  muon_lr: 0.05
  muon_momentum: 0.95
  muon_weight_decay: 0.0
  adam_lr: 0.008
  adam_betas:
  - 0.8
  - 0.95
  adam_eps: 1.0e-10
  adam_weight_decay: 0.0
  target_val_loss: 3.28
  checkpoint:
    dir: checkpoints
    every_steps: 250
    resume: true
  max_steps: 50
