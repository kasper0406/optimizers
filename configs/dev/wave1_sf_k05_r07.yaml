  muon_lr: 0.05
  muon_momentum: 0.95
  muon_weight_decay: 0.0
  adam_lr: 0.008
  adam_betas:
  - 0.8
  - 0.95
  adam_eps: 1.0e-10
  adam_weight_decay: 0.0
  target_val_loss: 3.28
  fork_from: checkpoints/nanogpt_seed{seed}_it1750_d1_4fa43038_rank0.pt
  tail:
    mode: schedule_free
    start_step: 963
    kappa: 0.5
    rho: 0.7
  checkpoint:
    dir: checkpoints
    every_steps: 0
    resume: true
    keep_on_success: false
