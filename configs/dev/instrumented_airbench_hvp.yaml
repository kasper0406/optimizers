# Phase-1 disambiguation ablation B: HVP-ENABLED instrumented airbench
# (WP1.2 follow-up; dev seeds; NOT a Gate-1 measurement config).
#
# Motivation (reports/wp12-phase1-measurement.md, gaps): the eta-lambda
# calibration plot (plan section 1.2, plot 3) was empty in WP1.2 because HVP
# probes were off.  This config reruns the WP1.2 instrumented recipe with
# instrumentation.hvp: true so that once per tracked pair per refresh
# (T_refresh=50), lambda_i = vec(u_i v_i^T)^T H vec(u_i v_i^T) restricted to
# that filter matrix is measured on the CURRENT batch via double-backward
# (src/instrument/hvp.py, AirbenchHvpProbe).  The resulting sidecars populate
# the calibration plot (src.instrument.plots) and the implied-vs-HVP
# eta*lambda agreement stats (scripts/analyze_disambiguation.py --hvp) for
# oscillating-classified directions.  HVPs remain Phase-1 VALIDATION ONLY --
# confined to instrumentation, never in any optimizer update path.
#
# Numerical safety on the half-precision model (documented in
# src/instrument/hvp.py): the probe never differentiates through the fp16
# training graph; it re-evaluates the same sum-reduced label-smoothed CE loss
# in FULL fp32 via torch.func.functional_call on detached fp32 copies of all
# params/buffers (training state, dtypes, and RNG untouched).  Cost: one fp32
# forward + one create-graph backward per refresh step (cached across all
# pairs/matrices of that step) + one HVP backward per tracked pair -- at
# these settings 4 fp32 graphs + 768 HVP backwards per 200-step run, off the
# per-step path.  metrics.hvp_graph_builds records the graph-build count.
#
# DEVIATION from the stock WP1.2 recipe: recipe.compile: false.
# Double-backward (create_graph) through a torch.compile'd model is
# unsupported, so this calibration run trains eagerly; the experiment refuses
# hvp: true with compile on.  This changes wall-clock (and torch.compile's
# usual numeric fusion differences), not the recipe's math -- acceptable for
# an estimator-calibration run, and these seeds enter no comparison table.
#
# Everything else is identical to configs/wp12_airbench_instrumented.yaml
# (same k1/k2, T_refresh, betas, snapshot cadence, classifier thresholds).
# Dev sweep of 3 seeds 1200-1202, disjoint from WP1.2's 1000-1019 and the
# with-replacement ablation's 1100-1102.
#
# LAUNCH PRECONDITION (WP1.2, CLAUDE.md): criteria/phase1_preregistration.md
# must exist; scripts/run.py enforces this for airbench_instrumented.
#
# Launch (GPU box):
#   uv run python scripts/sweep.py configs/dev/instrumented_airbench_hvp.yaml
#   bash sweeps/instrumented_airbench_hvp/run_all.sh

experiment: airbench_instrumented
seed: 1200
device: cuda

data:
  root: data/cifar10

train:
  epochs: 8
  batch_size: 2000

recipe:
  tta_level: 2
  compile: false       # REQUIRED with hvp: true (no double-backward through
                       # torch.compile); documented deviation, see header.
  # normalize_filter_weights: false is forced by the experiment itself.

instrumentation:
  k1: 16               # top singular pairs of M_t (plan section 1.1)
  k2: 16               # bulk probes, orthogonalized against the top block
  t_refresh: 50        # subspace refresh cadence (steps); HVP once per pair per refresh
  subspace_iters: 2    # warm-started subspace iterations per refresh
  betas: [0.9, 0.99]   # both EMA timescales (timescale sensitivity is a finding)
  align_min: 0.9       # refresh alignment below this = innovation reset
  snapshot_every: 5    # per-direction stat snapshot cadence (steps)
  seed: 4242           # instrumentation probe RNG (dev seed, >= 1000)
  min_dim: 8           # skip matrices whose flattened min dim is below this
  momentum_key: momentum_buffer
  hvp: true            # Phase-1 VALIDATION ONLY: per-pair-per-refresh curvature probes
  classifier:          # identical to the WP1.2 baseline config (occupancy labels only)
    tau_sig: 4.0
    tau_noise: 2.0
    rho_osc: 0.5
    n_min: 50
    z_reset: 6.0
    innov_needed: 2
    innov_window: 4

sweep:
  seeds: [1200, 1201, 1202]   # explicit dev seeds, disjoint from 1000-1019 and 1100-1102
