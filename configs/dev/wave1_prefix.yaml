# Wave-1 (prereg reports/wave1-anneal-decomposition-prereg.md). Shared hot-phase prefix P: baseline to step 963 (T_c), checkpoint kept for forking (prereg 0.2). ~41 min.
experiment: nanogpt
device: auto
seed: 1511
nanogpt:
  head_chunk_rows: 8192
  fp32_embed_grad_accum: true
  device_count: 1
  precision_mode: fp8
  attention_impl: flex
  compile: true
  warmup_steps: 10
  num_iterations: 1750
  cooldown_frac: 0.45
  min_lr_frac: 0.05
  val_loss_every: 125
  val_tokens: 10485760
  train_seq_len: 49152
  val_seq_len: 262144
  muon_lr: 0.05
  muon_momentum: 0.95
  muon_weight_decay: 0.0
  adam_lr: 0.008
  adam_betas:
  - 0.8
  - 0.95
  adam_eps: 1.0e-10
  adam_weight_decay: 0.0
  target_val_loss: 3.28
  max_steps: 963
  checkpoint:
    dir: checkpoints
    every_steps: 321
    resume: true
    keep_on_success: true
